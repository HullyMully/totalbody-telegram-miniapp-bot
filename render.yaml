services:
  - type: web
    name: totalbody-mini-app-demo
    runtime: static
    buildCommand: "true"
    staticPublishPath: tg-mini-app
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache

  - type: web
    name: totalbody-bot-demo
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /healthz
    envVars:
      - key: BOT_MODE
        value: webhook
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        value: "5947469995"
      - key: WEBAPP_URL
        value: https://totalbody-mini-app-demo.onrender.com?bot=demohmtgbot
      - key: DATABASE_URL
        fromDatabase:
          name: totalbody-demo-db
          property: connectionString
      - key: WEBHOOK_PATH
        value: /webhook

databases:
  - name: totalbody-demo-db
    plan: free
    region: frankfurt
